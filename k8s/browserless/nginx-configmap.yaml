apiVersion: v1
kind: ConfigMap
metadata:
  name: browserless-nginx-config
  labels:
    app.kubernetes.io/name: browserless-nginx
    app.kubernetes.io/component: load-balancer
    app.kubernetes.io/part-of: user-office-factory
data:
  default.conf: |
    server {
        listen 3000;

        # Use kube-dns for dynamic resolution; re-resolve every 10s
        resolver kube-dns.kube-system.svc.cluster.local valid=10s;

        location / {
            # Variable forces nginx to re-resolve DNS on each request
            set $backend "browserless-headless.browserless-cluster.svc.cluster.local:3000";
            proxy_pass http://$backend;

            # Only retry on connection errors, NOT on timeouts or slow responses
            # Remove non_idempotent to prevent duplicate processing of POST requests
            proxy_next_upstream error;
            proxy_next_upstream_tries 1;

            # WebSocket support (required by Puppeteer)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            # Extended timeouts for long-running browser operations
            proxy_connect_timeout 900;
            proxy_send_timeout 900;
            proxy_read_timeout 900;
            send_timeout 900;
        }

        # Health endpoint for probes
        location /healthz {
            access_log off;
            return 200 "ok";
        }
    }
