apiVersion: v1
kind: ConfigMap
metadata:
  name: browserless-nginx-config
  labels:
    app.kubernetes.io/name: browserless-nginx
    app.kubernetes.io/component: load-balancer
    app.kubernetes.io/part-of: user-office-factory
data:
  default.conf: |
    upstream browserless_backend {
        # Route each new WebSocket connection to the pod with fewest
        # active connections — gives even distribution when PDF
        # generation times vary.
        least_conn;
        server browserless-headless:3000;
    }

    server {
        listen 3000;

        location / {
            proxy_pass http://browserless_backend;

            # Retry on another pod when one fails or is at capacity
            proxy_next_upstream error timeout http_500 http_503 http_429 non_idempotent;

            # WebSocket support (required by Puppeteer)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            # Extended timeouts for long-running browser operations
            proxy_connect_timeout 900;
            proxy_send_timeout 900;
            proxy_read_timeout 900;
            send_timeout 900;
        }

        # Health endpoint for probes
        location /healthz {
            access_log off;
            return 200 "ok";
        }
    }
